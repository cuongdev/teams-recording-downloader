name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check all scripts
        run: |
          set -e
          for f in *.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Validate manifest.json
        run: |
          node -e '
            const m = require("./manifest.json");
            if (m.manifest_version !== 3) throw new Error("manifest_version must be 3");
            for (const k of ["name", "version", "content_scripts", "host_permissions"]) {
              if (!m[k]) throw new Error("missing manifest field: " + k);
            }
            console.log(m.name + " v" + m.version + " — manifest OK");
          '

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: node --test

  package:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: zip -r extension.zip manifest.json content.js chat-lib.js background.js options.html options.js intercept.js mux-worker.js icons

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip
